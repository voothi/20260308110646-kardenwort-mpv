# =========================================================================
# NAVIGATION & SYSTEM
# =========================================================================
# Seek forward/backward by exactly 2 seconds. 
# Optimized for re-listening to short phrases without overshooting.
RIGHT script-binding lls-seek_next_2
LEFT  script-binding lls-seek_prev_2

# --- Quit the player ---
q ignore
й ignore
Q script-binding cycle-copy-mode
Й script-binding cycle-copy-mode
~ quit

# --- OSC Visibility ---
# Toggle OSC (On-Screen Controller) visibility.
# Options: Always -> Auto (on mouse move) -> Never (cleanest focus).
TAB   script-binding toggle-osc-visibility

# --- Smart Spacebar (Custom FSM logic) ---
# - Hold: Continues playback while ignoring all autopause triggers.
# - Tap: Functions as a standard Play/Pause toggle.
SPACE     script-binding smart-space
MBTN_LEFT script-binding smart-space

# --- Volume & Mute ---
m     cycle mute
ь     cycle mute
n     ignore
т     ignore
0     add volume 2
9     add volume -2

# --- Video Adjustments ---
1 add contrast -1
2 add contrast 1

# --- Playback Speed ---
[     multiply speed 1/1.1
]     multiply speed 1.1
{     multiply speed 0.5
}     multiply speed 2.0
х     multiply speed 1/1.1
ъ     multiply speed 1.1
Х     multiply speed 0.5
Ъ     multiply speed 2.0
BS    set speed 1.0

# --- Frame Stepping ---
.     frame-step
,     frame-back-step
ю     frame-step
б     frame-back-step


# =========================================================================
# ENGLISH LAYOUT (EN)
# =========================================================================
# --- Subtitle Navigation ---
# Jump directly to the previous or next subtitle line.
a script-binding lls-seek_prev
d script-binding lls-seek_next

# --- Track Navigation ---
# Seek forward/backward by exactly 2 seconds.
A script-binding lls-seek_prev_2
D script-binding lls-seek_next_2

# --- Visibility & Track Cycle ---
# Toggle Subtitle Visibility. 
# Hide text to test your hearing, then toggle back to verify.
s script-binding replay-subtitle

# Cycle Secondary Subtitle Track (Translation).
j ignore

# Suppress default mpv panscan on 'e' (used for tooltips in window mode).
e ignore

# --- Subtitle Positioning (Configurable via lls-key_sub_pos_*) ---
# r / t (к / е): Move primary subtitle position UP/DOWN.
# R / T (К / Е): Move secondary subtitle position UP/DOWN.
# y (н): Cycle secondary position (Top <-> Bottom).
y ignore

# --- Drum Mode & Window ---
# Toggle Drum Mode (Multi-line scrolling context).
# Read the current line along with surrounding sentences for better comprehension. (Styling in mpv.conf)
c script-binding toggle-sub-visibility
C script-binding cycle-sec-sid
w ignore

# Open Drum Window and activate Search Mode directly (Styling in mpv.conf)
Ctrl+f script-binding toggle-drum-search
F      script-binding toggle-karaoke-mode
# f      script-binding toggle-drum-search
v      cycle fullscreen
;      add panscan -0.1
'      add panscan +0.1
ж      add panscan -0.1
э      add panscan +0.1
W script-binding toggle-copy-context
E ignore
Ц script-binding toggle-copy-context
У ignore

# --- [Internal Drum Window Shortcuts] ---
# Note: These keys are active only while the Drum Window is open.
#
# --- Configurable via mpv.conf (lls-dw_key_*) ---
# - dw_key_select:          Select word/line (drag to scroll)              [default: MBTN_LEFT]
# - dw_key_add:             Smart-Add word/set to Anki (Yellow/Pink)       [default: MBTN_MID t е]
# - dw_key_pair:            Toggle paired-set membership (Pink)            [default: r к Ctrl+MBTN_LEFT]
# - dw_key_tooltip_pin:     Pin/unpin translation tooltip                  [see mpv.conf]
# - dw_key_tooltip_hover:   Toggle tooltip hover mode                      [see mpv.conf]
# - dw_key_tooltip_toggle:  Toggle tooltip visibility                      [see mpv.conf]
#
# --- Hardcoded system keys (not configurable via mpv.conf) ---
# - dw_key_select_left/right/up/down Navigate + select [default: Shift+Arrows]
#
# --- Navigation ---
# - dw_key_jump_left/right   Jump words             [default: Ctrl+LEFT/RIGHT] (amount: lls-dw_jump_words)
# - dw_key_jump_select_left/right Jump words + select [default: Ctrl+Shift+LEFT/RIGHT] (amount: lls-dw_jump_words)
# - dw_key_scroll_up/down     Scroll viewport        [default: Ctrl+UP/DOWN] (no cursor move)
# - dw_key_jump_select_up/down Jump lines + select [default: Ctrl+Shift+UP/DOWN] (amount: lls-dw_jump_lines in mpv.conf)
# - WHEEL_UP / WHEEL_DOWN   Scroll viewport
# - dw_key_seek_prev:       Seek to prev subtitle  (same as lls-seek_prev globally) [default: a ф]
# - dw_key_seek_next:       Seek to next subtitle  (same as lls-seek_next globally) [default: d в]
# - dw_key_copy:            Copy selected words to clipboard      [default: Ctrl+c Ctrl+с]
# - dw_key_open_record:     Open Anki record (TSV) file            [default: b и]
# - dw_key_seek:            Seek to selected line                  [default: ENTER KP_ENTER]
# - dw_key_esc:             Universal Clear: Discard pink/yellow selection (1st press) / Close window (2nd press) [default: ESC]
# - dw_key_search:          Toggle search (same as toggle-drum-search globally, see line above) [default: f Ctrl+f а Ctrl+а]
# - dw_key_select_extend    Extend word selection with mouse [default: Shift+MBTN_LEFT] (configured via lls-dw_key_select_extend)
# - dw_key_pair_mod         Modifier tracking for paired selection [default: Ctrl]
# - dw_key_mouse_seek       Seek to word's subtitle [default: MBTN_LEFT_DBL] (configured via lls-dw_key_mouse_seek)
#
# --- Search Mode (Drum Window 'f') ---
# - search_key_bs           Delete character before cursor          [default: BS]
# - search_key_del          Delete character after cursor           [default: DEL]
# - search_key_select_left   Select text left                       [default: Shift+LEFT]
# - search_key_select_right  Select text right                      [default: Shift+RIGHT]
# - search_key_jump_left    Jump words left                         [default: Ctrl+LEFT]
# - search_key_jump_right   Jump words right                        [default: Ctrl+RIGHT]
# - search_key_home         Jump to start of query                  [default: HOME]
# - search_key_end          Jump to end of query                    [default: END]
# - search_key_enter        Seek to selected result and close       [default: ENTER]
# - search_key_esc          Close search                            [default: ESC]
# - search_key_paste        Paste from clipboard                    [default: Ctrl+v Ctrl+м]
# - search_key_select_all   Select all text                         [default: Ctrl+a Ctrl+ф]
# - search_key_delete_word  Delete word before cursor               [default: Ctrl+w Ctrl+ц]
# - search_key_click        Position cursor / Select result (mouse) [default: MBTN_LEFT]
# [Hardcoded in Search Mode]:
# - LEFT / RIGHT            Move text cursor
# - UP / DOWN               Navigate result list
# - WHEEL_UP / WHEEL_DOWN   Scroll result list

# --- Copy Logic ---
# Toggle Context Copy (X/x logic).
# When ON, copying will include surrounding context lines. (Context config in mpv.conf)
x script-binding toggle-drum-mode
X script-binding cycle-secondary-pos

# Cycle Subtitle Copy Mode (Target vs Translation). (Default: lls-copy_default_mode in mpv.conf)
z script-binding toggle-drum-window
Z script-binding toggle-book-mode
u ignore

# The Master Copy Command.
# Extracts clean subtitle text (stripping ASS tags) to the system clipboard.
Ctrl+c script-binding copy-subtitle

# --- Desktop Features ---
# Standard mpv Screenshot.
S script-binding toggle-autopause
h script-binding toggle-anki-global
b script-binding toggle-record-file
g ignore
o ignore
O ignore
щ ignore
Щ ignore


