н script-binding cycle-secondary-pos
с script-binding toggle-drum-mode
ц script-binding toggle-drum-window
Ctrl+а script-binding toggle-drum-search
а script-binding toggle-drum-search
ч script-binding toggle-copy-context
Ч script-binding toggle-copy-context
я script-binding cycle-copy-mode
Я script-binding cycle-copy-mode
Ctrl+с script-binding copy-subtitle
Ы screenshot
п script-binding toggle-anki-global
и script-binding toggle-book-mode


# =========================================================================
# FEATURE TOGGLES (Autopause / Karaoke)
# =========================================================================
# --- Master Autopause Toggle ---
# Pauses the video automatically at the end of every sentence. (Default: lls-autopause_default in mpv.conf)
p script-binding toggle-autopause
P script-binding toggle-autopause
з script-binding toggle-autopause
З script-binding toggle-autopause

# --- Karaoke Granularity Toggle ---
# - Phase Mode: Pauses only at the end of the full sentence.
# - Word Mode: Pauses after every individual highlighted word (for difficult audio). (Default: lls-karaoke_every_word in mpv.conf)
k script-binding toggle-karaoke-mode
K script-binding toggle-karaoke-mode
л script-binding toggle-karaoke-mode
Л script-binding toggle-karaoke-mode


# =========================================================================
# SUBTITLE POSITIONING (Layout-agnostic)
# =========================================================================
# --- Primary Subtitle Positioning ---
# Move text vertically to avoid overlap or clear space for the OSC.
r add sub-pos +1
t add sub-pos -1
к add sub-pos +1
е add sub-pos -1

# --- Secondary Subtitle Positioning ---
# Similar to r/t for primary subs, but for the secondary track.
R add secondary-sub-pos +1
T add secondary-sub-pos -1
К add secondary-sub-pos +1
Е add secondary-sub-pos -1

