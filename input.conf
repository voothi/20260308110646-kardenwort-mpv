# Scroll left/right arrows for exactly 2 seconds
RIGHT seek  2 exact
LEFT  seek -2 exact

# Copy the text of the current subtitles to the clipboard by pressing Ctrl+C
Ctrl+c script-binding copy-subtitle
Ctrl+с script-binding copy-subtitle  # (Здесь русская буква "с")

# Cycle through subtitle copy modes (A/B) for stacked ASS subtitles
Ctrl+z script-binding cycle-copy-mode
Ctrl+я script-binding cycle-copy-mode

# ========================================================
# ENGLISH LAYOUT (EN)
# ========================================================
a sub-seek -1
d sub-seek  1
s script-binding toggle-sub-visibility
j script-binding cycle-sec-sid
y script-binding cycle-secondary-pos
c script-binding toggle-drum-mode
S screenshot

# =========================================================
# RUSSIAN LAYOUT (RU)
# =========================================================
ф sub-seek -1
в sub-seek  1
ы script-binding toggle-sub-visibility
о script-binding cycle-sec-sid
н script-binding cycle-secondary-pos
с script-binding toggle-drum-mode
Ы screenshot

# =========================================================
# SYSTEM KEYS (work everywhere)
# ========================================================
TAB script-binding toggle-osc-visibility

# Smart Spacebar (Hold-to-Play, Tap-to-Pause)
SPACE script-binding smart-space

# Autopause and Karaoke Mode Hotkeys (English & Russian)
p script-binding toggle-autopause
P script-binding toggle-autopause
з script-binding toggle-autopause
З script-binding toggle-autopause

k script-binding toggle-karaoke-mode
K script-binding toggle-karaoke-mode
л script-binding toggle-karaoke-mode
Л script-binding toggle-karaoke-mode