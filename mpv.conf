# Primary subtitle alignment (Default is bottom).
# By staying at the bottom, secondary subtitles will automatically appear at the top.
sub-align-y=bottom
sub-margin-y=20
# Top subtitle position (percentage from top).
# 10% pushes it down so it is not pressed against the top edge.
secondary-sub-pos=10
# Main subtitle position (percentage from top). 
# 95-100 is the bottom area; adjusting this helps avoid overlap with OSC.
sub-pos=95

# Reasonable default font size for .srt subtitles (mpv default 55 is often too large)
sub-font-size=24
# Automatically load all subtitles in the folder (useful for EN + RU .srt files)
sub-auto=all

# Support for HTML tags and styles
sub-ass=yes
# STRICTLY respect the .ass file's internal styles (From Android Config)
sub-ass-override=no

save-position-on-quit=yes

# Always open the window exactly in the center of the screen
# geometry=50%:50%

# Limit the maximum window size to 80% of the screen size,
# so that the video never goes beyond the borders of the monitor
# autofit-larger=80%x80%
 
# (Optional) If you want the player to ALWAYS open in a specific size, 
# ignoring video resolution (e.g. 1280x720):
# autofit=1280x720
autofit=1920x1080

# --- Let MPV scale subtitles with the window! ---
# If these are 'no', .srt text becomes giant on smaller windows.
# sub-scale-with-window=no
# sub-ass-scale-with-window=no

# Increase or decrease the base font size from the subtitle file
# 1.0 - original size, 1.5 - 50% larger, 0.8 - 20% smaller
# sub-scale=1.5

# Disable OSC (panel) at startup
# osc=no
# osd-bar=no

# # Prevent OSC from appearing on mouse hover
script-opts-append=osc-visibility=never