# --- Anki Highlighter Settings ---
# dw_key_add: List of keys (e.g. MBTN_MID Ctrl+MBTN_MID r к) for smart-add (Yellow/Pink).
# dw_key_pair: List of keys (e.g. t е Ctrl+MBTN_LEFT) to toggle paired selection members.
#             Note: Paired selection (Pink) overlaps all other highlight colors.
# dw_key_select: List of keys (e.g. MBTN_LEFT) for standard contiguous selection.
# anki_context_max_words: Max words to extract for the sentence context.
# anki_context_span_pad: Extra words added before/after the first/last selected word when a
#                        paired selection spans more words than anki_context_max_words allows.
# anki_context_lines: Number of surrounding subtitle lines to include as context.
# anki_highlight_depth_1-3: Shades of Orange (BGR | RGB) for overlapping highlights.
# anki_split_depth_1-3: Shades of Purple (BGR | RGB) for non-contiguous (split) highlights.
# anki_mix_depth_1-3: Shades of Brick (BGR | RGB) for intersections of contiguous and split terms.
# anki_highlight_bold: Apply bold text styling to highlights.
# anki_global_highlight: Burn highlights throughout the entire video (or just at the original timestamp).
# anki_strip_metadata: Automatically remove bracketed metadata tags (e.g. [musik], [Lachen]) from exports.
# anki_sync_period: Interval (in seconds) to automatically reload the TSV record file.
# anki_local_fuzzy_window: Time window (in seconds) to search for matching records when local timestamps drift.
# anki_split_search_window: Max subtitle segments (+/-) to scan when matching paired words (default 35).
# anki_split_gap_limit: Max temporal gap (seconds) between paired words (default 60.0s).
# anki_neighbor_window: Context search range (+/- lines) for identifying contiguous neighbors (default 5).
# lls-dw_mouse_shield_ms: Interaction Shield window (ms) to ignore mouse events after a keyboard command. 
#                   Prevents 'ghost clicks' from hardware jitter. Recommended: 50.
