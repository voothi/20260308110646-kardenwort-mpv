# =========================================================================
# GENERAL SUBTITLE SETTINGS
# =========================================================================
# Primary subtitle alignment (Default is bottom).
# By staying at the bottom, secondary subtitles will automatically appear at the top.
sub-align-y=bottom
sub-margin-y=20

# --- Secondary subtitle position (percentage from top) ---
# This is the 'default' start position.
# [v1.2.12] Can be adjusted on-the-fly with 'Shift+R'/'Shift+T' (EN) or 'К'/'Е' (RU).
secondary-sub-pos=10

# --- Main subtitle position (percentage from top) ---
# 95-100 is the bottom area; adjusting this helps avoid overlap with OSC.
# [v1.2.12] Can be adjusted on-the-fly with 'r'/'t' (EN) or 'к'/'е' (RU).
sub-pos=95


# =========================================================================
# LLS SCRIPT OVERRIDES
# You can control lls_core.lua behavior here without editing the script.
# =========================================================================

# --- Font Scaling (Replaces fixed_font.lua) ---
# If enabled, prevents standard subtitles from shrinking too much on small windows.
# font_scale_strength: 0.0 (shrinks normally) to 1.0 (strict 1080p size, wraps heavily).
# font_scaling_enabled: set to 'no' to disable completely.
script-opts-append=lls-font_scaling_enabled=yes
script-opts-append=lls-font_base_height=1080
script-opts-append=lls-font_base_scale=1.0
script-opts-append=lls-font_scale_strength=0.5

# --- Toggle Destinations for cmd_cycle_sec_pos ---
# sec_pos_bottom MUST be different (e.g., 90) from sub-pos (95) 
# to preserve a 5% "Safety Gap" so dual subtitles don't stick together.
script-opts-append=lls-sec_pos_top=10
script-opts-append=lls-sec_pos_bottom=90

# --- AutoPause Settings ---
# autopause_default: Automatically pause at the end of every subtitle line.
# karaoke_every_word: If yes, pauses at every highlighted word (karaoke token) instead of the end of the phrase. This works together with autopause_default.
# pause_padding: Extra delay (in seconds) to wait before the subtitle actually ends. Gives a short buffer to hear the end of words.
# karaoke_token: The ASS literal markup used to highlight the active karaoke word.
# space_tap_delay: Time in seconds to differentiate between a quick spacebar tap (Play/Pause) and a hold (Continue playing without autopause).
script-opts-append=lls-autopause_default=yes
script-opts-append=lls-karaoke_every_word=no
script-opts-append=lls-pause_padding=0.15
script-opts-append=lls-karaoke_token={\c}
script-opts-append=lls-space_tap_delay=0.2

# --- Drum Mode Settings ---
# Drum Mode visually highlights the current subtitle line while dimming surrounding context lines.
# font_size: Base text size in Drum Mode.
# context_lines: Number of previous/next lines to display around the active line for context.
# context_opacity / active_opacity: Transparency levels in hexadecimal (00 is fully opaque, FF is fully transparent).
# context_color / active_color: Text color in BGR hex format.
# spacing_gap: Controls vertical spacing tightness between lines.
# stack_multiplier: Controls vertical spacing multiplier.
script-opts-append=lls-drum_font_size=34
script-opts-append=lls-drum_context_lines=3
script-opts-append=lls-drum_context_opacity=30
script-opts-append=lls-drum_context_color=FFFFFF
script-opts-append=lls-drum_context_bold=no
script-opts-append=lls-drum_context_size_mul=1.0
script-opts-append=lls-drum_active_opacity=00
script-opts-append=lls-drum_active_color=FFFFFF
script-opts-append=lls-drum_active_bold=no
script-opts-append=lls-drum_active_size_mul=1.0
script-opts-append=lls-drum_spacing_gap=-0.1
script-opts-append=lls-drum_stack_multiplier=1.15

# --- Copy Mode Settings ---
# Settings for when copying subtitles to clipboard using Ctrl+c.
# default_mode: "A" copies the primary subtitle track, "B" copies the secondary.
# filter_russian: Skip cyrillic text if copying target language to help maintain a clean target-only flashcard.
# context_lines: How many surrounding lines to copy if 'Copy Context' is toggled ON.
# word_limit: Max number of words per line to consider when building context.
script-opts-append=lls-copy_default_mode=A
script-opts-append=lls-copy_filter_russian=yes
script-opts-append=lls-copy_context_lines=2
script-opts-append=lls-copy_word_limit=3

# # --- DW MODE 1: Consolas 30 (Old Calibration) ---
# # To use this mode, uncomment the lines below and comment out MODE 2.
# script-opts-append=lls-dw_font_size=30
# script-opts-append=lls-dw_vline_h_mul=0.9
# script-opts-append=lls-dw_sub_gap_mul=0.6
# script-opts-append=lls-dw_char_width=0.5

# --- DW MODE 2: Consolas 34 (Current Calibration) ---
# To use this mode, ensure the lines below are uncommented.
# vline_h_mul: Tune if clicks land on the line ABOVE (increase) or BELOW (decrease).
# sub_gap_mul: Tune the "dead space" between distinct subtitle blocks. 
# Increase if you have to click too low into the next sub before it highlights.
# Selected values (0.87 / 0.6 / 0.5) are calibrated for dw_font_size=34.
script-opts-append=lls-dw_font_size=34
script-opts-append=lls-dw_vline_h_mul=0.87
script-opts-append=lls-dw_sub_gap_mul=0.6
script-opts-append=lls-dw_char_width=0.5

# --- Common Drum Window Settings ---
script-opts-append=lls-dw_lines_visible=15
script-opts-append=lls-dw_bg_color=000000
script-opts-append=lls-dw_bg_opacity=60
script-opts-append=lls-dw_text_color=CCCCCC
script-opts-append=lls-dw_active_color=FFFFFF
script-opts-append=lls-dw_highlight_color=00FFFF
script-opts-append=lls-dw_font_name=Consolas



# --- Drum Window Tooltip Settings ---
script-opts-append=lls-dw_tooltip_font_size=32
script-opts-append=lls-dw_tooltip_bg_opacity=60
script-opts-append=lls-dw_tooltip_bg_color=222222
script-opts-append=lls-dw_tooltip_text_color=CCCCCC
script-opts-append=lls-dw_tooltip_text_opacity=00
script-opts-append=lls-dw_tooltip_bold=no
script-opts-append=lls-dw_tooltip_border_size=1.5
script-opts-append=lls-dw_tooltip_shadow_offset=1.0
script-opts-append=lls-dw_tooltip_context_lines=3
script-opts-append=lls-dw_tooltip_pin_key=MBTN_RIGHT
script-opts-append=lls-dw_tooltip_hover_key=n
script-opts-append=lls-dw_tooltip_hover_key_ru=т


# --- Search HUD Styling ---
# Hit styling for search HUD interface. Match highlighting and selection line colors.
script-opts-append=lls-search_hit_color=0088FF
script-opts-append=lls-search_hit_bold=no
script-opts-append=lls-search_sel_color=FFFFFF
script-opts-append=lls-search_sel_bold=no
script-opts-append=lls-search_query_hit_color=0088FF
script-opts-append=lls-search_query_hit_bold=no

# --- Navigation Repeat Settings ---
# seek_hold_delay: How long to wait (in seconds) before auto-scrolling starts when holding navigation keys (a/d).
# Recommended: 0.3 to 0.5.
# seek_hold_rate: Number of subtitles to jump per second during hold (repetition frequency).
# Recommended: 5 to 15.
script-opts-append=lls-seek_hold_delay=0.5
script-opts-append=lls-seek_hold_rate=10

# --- Anki Highlighter Settings ---
# dw_export_key: Mouse button used to commit selection to TSV. (Default: MBTN_MID)
# anki_context_max_words: Max words to extract for the sentence context.
# anki_tsv_headers: Column headers for the TSV file (Tab-separated literal \t).
# anki_highlight_depth_1-3: Shades of green (BGR hex) for overlapping highlights.
# anki_global_highlight: Burn highlights throughout the entire video (or just at the original timestamp).
script-opts-append=lls-dw_export_key=MBTN_MID
script-opts-append=lls-anki_context_max_words=20
script-opts-append=lls-anki_context_lines=3
script-opts-append=lls-anki_tsv_headers=WordSource	SentenceSource
script-opts-append=lls-anki_highlight_depth_1=0075D1
script-opts-append=lls-anki_highlight_depth_2=005DAE
script-opts-append=lls-anki_highlight_depth_3=003A70
script-opts-append=lls-anki_highlight_bold=yes
script-opts-append=lls-anki_global_highlight=no
script-opts-append=lls-anki_sync_period=5
script-opts-append=lls-anki_local_fuzzy_window=10

# --- System / Performance ---
# tick_rate: Script processing tick frequency (seconds).
# osd_duration: Default duration to show on-screen notification messages (seconds).
script-opts-append=lls-tick_rate=0.05
script-opts-append=lls-osd_duration=1.0


# =========================================================================
# TRACK LOADING & AUTO-BEHAVIOR
# =========================================================================
# --- Subtitle Loading ---
# Reasonable default font size for .srt subtitles (mpv default 55 is often too large)
sub-font-size=24

# Automatically load subtitle files containing the video's filename
sub-auto=fuzzy

# (Template) Automatically load ALL subtitles in the folder
# sub-auto=all

# --- Language Preferences ---
# (Template) Preferred audio and subtitle languages (e.g., prioritize English)
# alang=english,eng,en
# slang=english,eng,en

# --- Visibility & Scaling ---
# (Template) Hide subtitles by default for listening practice
# sub-visibility=no

# (Template) Prevent standard subtitles from scaling with the window
# sub-scale-with-window=no
# sub-ass-scale-with-window=no

# (Template) Manually increase/decrease the base font size from the subtitle file (e.g. 1.5 = 150%)
# sub-scale=1.5

# Support for HTML tags and styles
sub-ass=yes

# STRICTLY respect the .ass file's internal styles
sub-ass-override=no

# Save playback position on quit
# save-position-on-quit=yes


# =========================================================================
# INTERFACE & WINDOW BEHAVIOR
# =========================================================================
# Always open the window exactly in the center of the screen
geometry=50%:50%

# Limit the maximum window size to 100% of the screen size,
# so that the video never goes beyond the borders of the monitor
autofit-larger=100%x100%
 
# (Optional) If you want the player to ALWAYS open in a specific size, 
# ignoring video resolution (e.g. 1280x720):
# autofit=1280x720
autofit=1920x1080

# Disable OSC (panel) at startup
# osc=no
osd-bar=no

# Prevent OSC from appearing on mouse hover
script-opts-append=osc-visibility=never


# =========================================================================
# SUBTITLE & OSD APPEARANCE STYLES (Choose ONE mode below)
# =========================================================================

