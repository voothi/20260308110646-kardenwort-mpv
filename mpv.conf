# =========================================================================
# Kardenwort MPV - Language Acquisition Suite
# =========================================================================
# GENERAL SUBTITLE SETTINGS
# =========================================================================
# Primary subtitle alignment (Default is bottom).
# By staying at the bottom, secondary subtitles will automatically appear at the top.
sub-align-y=bottom
sub-margin-y=20

# Force enable secondary subtitles on load
sid=1
secondary-sid=2

# Prevents watch-later from overriding the auto-enabled subtitle tracks
watch-later-options-remove=sid,secondary-sid

# --- Secondary subtitle position (percentage from top) ---
# This is the 'default' start position.
# [v1.2.12] Can be adjusted on-the-fly with 'Shift+R'/'Shift+T' (EN) or 'К'/'Е' (RU).
secondary-sub-pos=10

# --- Main subtitle position (percentage from top) ---
# 95-100 is the bottom area; adjusting this helps avoid overlap with OSC.
# [v1.2.12] Can be adjusted on-the-fly with 'r'/'t' (EN) or 'к'/'е' (RU).
sub-pos=95


# =========================================================================
# KARDENWORT SCRIPT OVERRIDES
# You can control kardenwort behavior here without editing the script.
# =========================================================================

# --- Font Scaling (Replaces fixed_font.lua) ---
# If enabled, prevents standard subtitles from shrinking too much on small windows.
# font_scale_strength: 0.0 (shrinks normally) to 1.0 (strict 1080p size, wraps heavily).
# font_scaling_enabled: set to 'no' to disable completely.
script-opts-append=kardenwort-font_scaling_enabled=yes
script-opts-append=kardenwort-font_base_height=1080
script-opts-append=kardenwort-font_base_scale=1.0
script-opts-append=kardenwort-font_scale_strength=0.5

# --- Toggle Destinations for cmd_cycle_sec_pos ---
# sec_pos_bottom MUST be different (e.g., 90) from sub-pos (95) 
# to preserve a 5% "Safety Gap" so dual subtitles don't stick together.
script-opts-append=kardenwort-sec_pos_top=10
script-opts-append=kardenwort-sec_pos_bottom=90

# --- AutoPause Settings ---
# =========================================================================
# KARDENWORT IMMERSION ENGINE (v1.58.51)
# =========================================================================

# --- 1. Autopause & Karaoke ---
script-opts-append=kardenwort-autopause_default=yes
script-opts-append=kardenwort-karaoke_every_word=no
script-opts-append=kardenwort-pause_padding=0.15
script-opts-append=kardenwort-karaoke_token={\c}
script-opts-append=kardenwort-space_tap_delay=0.2

# --- 2. Audio Padding & Immersion Modes ---
# audio_padding_start: Pre-roll audio buffer (ms) to hear the start of the phrase.
# audio_padding_end: Post-roll audio buffer (ms) to hear the end/tail of the phrase.
script-opts-append=kardenwort-audio_padding_start=1000
script-opts-append=kardenwort-audio_padding_end=1000

# Immersion Modes (Shift+h / H):
# - PHRASE (Discrete Cards): Repeated overlap audio ("Jerk-Back"), focus on isolated fragments.
# - MOVIE (Cinematic Flow): Seamless gapless transitions, focus on immersion.
script-opts-append=kardenwort-immersion_mode_default=PHRASE
script-opts-append=kardenwort-key_cycle_immersion_mode=F А
# - MOVIE (Cinematic Flow): Seamless gapless transitions, focus on immersion.

# --- 3. Scientific Behavioral Parameters ---
# nav_cooldown: Settle period (seconds) after manual navigation (a, d, Enter).
script-opts-append=kardenwort-nav_cooldown=0.5
# nav_tolerance: Precision buffer (seconds) for boundary detection/overlaps.
script-opts-append=kardenwort-nav_tolerance=0.05
# autopause_overshoot: Safety window (seconds) to catch boundary crossings.
script-opts-append=kardenwort-autopause_overshoot=0.1

# --- 4. Navigation & Feedback ---
# seek_time_delta: Amount to seek (seconds) for relative navigation (LEFT/RIGHT, Shift+A/D).
script-opts-append=kardenwort-seek_time_delta=2
# seek_osd_duration: Duration (seconds) of the centered seek OSD message.
script-opts-append=kardenwort-seek_osd_duration=2
# seek_font_size: Font size for directional seek feedback.
script-opts-append=kardenwort-seek_font_size=42
# seek_font_name: Font name for directional seek feedback.
script-opts-append=kardenwort-seek_font_name=Consolas
# seek_font_bold: Bold font for directional seek feedback.
script-opts-append=kardenwort-seek_font_bold=no
# seek_color: Font color (BGR hex) for directional seek feedback.
script-opts-append=kardenwort-seek_color=FFFFFF
# seek_bg_color: Background/Border color (BGR hex) for directional seek feedback.
script-opts-append=kardenwort-seek_bg_color=000000
# seek_bg_opacity: Background/Shadow transparency (00-FF).
script-opts-append=kardenwort-seek_bg_opacity=60
# seek_border_size: Border size for directional seek feedback.
script-opts-append=kardenwort-seek_border_size=1.5
# seek_shadow_offset: Shadow offset for directional seek feedback.
script-opts-append=kardenwort-seek_shadow_offset=1.0
# seek_show_accumulator: Use cumulative counting for consecutive seeks (YouTube style).
script-opts-append=kardenwort-seek_show_accumulator=yes
# seek_msg_format: Format for single/disconnected seeks. 
# Placeholders: %p=prefix (+/-), %v=value (e.g. 2)
script-opts-append=kardenwort-seek_msg_format=%p%v
# seek_msg_cumulative_format: Format for cumulative seeks in the same direction.
# Placeholders: %P=acc prefix, %V=acc value (e.g. 4)
script-opts-append=kardenwort-seek_msg_cumulative_format=%P%Vs

