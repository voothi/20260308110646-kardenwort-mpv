script-opts-append=kardenwort-anki_split_search_window=35
script-opts-append=kardenwort-anki_split_gap_limit=60.0
script-opts-append=kardenwort-anki_neighbor_window=5
script-opts-append=kardenwort-anki_context_strict=yes
# anki_abbrev_list: Space-separated list of literal abbreviations (case-insensitive) to ignore as sentence boundaries.
# anki_abbrev_smart: Enable heuristic detection for common patterns (e.g. short-lowercase-dotted words).
script-opts-append=kardenwort-anki_abbrev_list=ca. z.B. usw. bzw. etc. t.con
script-opts-append=kardenwort-anki_abbrev_smart=yes
script-opts-append=kardenwort-dw_mouse_shield_ms=50       # Interaction Shield (ms)

# --- System / Performance ---
# tick_rate: Script processing tick frequency (seconds).
# osd_duration: Default duration to show on-screen notification messages (seconds).
# win_clipboard_retries: Total number of attempts to set the clipboard on Windows.
# win_clipboard_retry_delay: Delay in milliseconds between retry attempts.
# goldendict_trigger: If yes, explicitly sends ^!+n after copying to trigger lookup.
# gd_trigger_lock_duration: Minimum time (seconds) between dictionary triggers to prevent loops.
script-opts-append=kardenwort-tick_rate=0.05
script-opts-append=kardenwort-osd_duration=0.5
script-opts-append=kardenwort-win_clipboard_retries=2
script-opts-append=kardenwort-win_clipboard_retry_delay=10
script-opts-append=kardenwort-gd_trigger_enabled=yes
script-opts-append=kardenwort-gd_trigger_lock_duration=2.0
# gd_trigger_enabled: If yes, explicitly sends a hotkey after copying to trigger GoldenDict.
# python_path: Path to the python executable (if using python method).
# python_trigger_delay_popup: Sync delay (seconds) for side popup dictionary window.
# python_trigger_delay_main: Sync delay (seconds) for main dictionary window.
# Trigger method: "powershell" (no deps) or "python" (requires python, but faster)
script-opts-append=kardenwort-gd_trigger_method=python
script-opts-append=kardenwort-python_path=python
script-opts-append=kardenwort-python_trigger_delay_popup=0.1
script-opts-append=kardenwort-python_trigger_delay_main=0.5
script-opts-append=kardenwort-gd_hotkey_popup=Ctrl+Alt+Shift+n # Ctrl+Alt+Shift+q - gd-side.ahk, Ctrl+Alt+Shift+n - direct popup
script-opts-append=kardenwort-gd_hotkey_main=Ctrl+Alt+Shift+1 # Ctrl+Alt+Shift+1 - gd-main.ahk
# key_copy_popup: Global and Drum Window hotkey for Popup dictionary lookup.
# key_copy_main: Global and Drum Window hotkey for Main dictionary lookup.
script-opts-append=kardenwort-key_copy_popup=q й
script-opts-append=kardenwort-key_copy_main=w ц

# --- Record File Editor ---
# Path to the editor used to open the TSV record file when pressing 'b' in the Drum Window (w).
# Example: C:\Program Files\Microsoft VS Code\Code.exe
script-opts-append=kardenwort-record_editor=C:\Program Files\Microsoft VS Code\Code.exe
script-opts-append=kardenwort-sentence_word_threshold=3

# --- Subtitle Positioning Keys ---
script-opts-append=kardenwort-key_sub_pos_up=r к
script-opts-append=kardenwort-key_sub_pos_down=t е
script-opts-append=kardenwort-key_sec_sub_pos_up=R К
script-opts-append=kardenwort-key_sec_sub_pos_down=T Е


# =========================================================================
# TRACK LOADING & AUTO-BEHAVIOR
# =========================================================================
# --- Subtitle Loading ---
# Reasonable default font size for .srt subtitles (mpv default 55 is often too large)
sub-font-size=24

# Automatically load subtitle files containing the video's filename
sub-auto=fuzzy

# (Template) Automatically load ALL subtitles in the folder
# sub-auto=all

# --- Language Preferences ---
# (Template) Preferred audio and subtitle languages (e.g., prioritize English)
# alang=english,eng,en
# slang=english,eng,en

# --- Visibility & Scaling ---
# (Template) Hide subtitles by default for listening practice
# sub-visibility=no

# (Template) Prevent standard subtitles from scaling with the window
# sub-scale-with-window=no
# sub-ass-scale-with-window=no

# (Template) Manually increase/decrease the base font size from the subtitle file (e.g. 1.5 = 150%)
# sub-scale=1.5

# Support for HTML tags and styles
sub-ass=yes

# STRICTLY respect the .ass file's internal styles
sub-ass-override=no

# Save playback position on quit
save-position-on-quit=yes


# =========================================================================
# INTERFACE & WINDOW BEHAVIOR
# =========================================================================
# Always open the window exactly in the center of the screen
geometry=50%:50%

# Limit the maximum window size to 100% of the screen size,
# so that the video never goes beyond the borders of the monitor
autofit-larger=100%x100%
 
# (Optional) If you want the player to ALWAYS open in a specific size, 
# ignoring video resolution (e.g. 1280x720):
# autofit=1280x720
autofit=1920x1080

# Disable OSC (panel) at startup
# osc=no
osd-bar=no

# Prevent OSC from appearing on mouse hover
script-opts-append=osc-visibility=never

# Prevent window from closing at the end of video
keep-open=yes



# =========================================================================
# SUBTITLE & OSD APPEARANCE STYLES (Choose ONE mode below)
# =========================================================================

# --- MODE 1: BLACK FRAME (PotPlayer-like, better readability) ---
# To align native SRT subtitles with the script's dark HUD aesthetic:
# Use 'background-box' and set 'sub-back-color' alpha to C0 (approx 75% opacity).
# This matches the 'bg_opacity=60' (ASS Hex) used by the Kardenwort renderers.
sub-border-style=background-box
sub-back-color="#C0000000"
sub-border-size=1.5
sub-shadow-offset=1
# sub-shadow-color="#000000"

osd-border-style=background-box
osd-back-color="#C0000000"
osd-border-size=1.5
osd-shadow-offset=1
# osd-shadow-color="#000000"

