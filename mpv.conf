# --- Unified Adaptive Replay (s) ---
# replay_ms: The fixed window (in milliseconds) to jump back when replaying a phrase.
# replay_count: Number of times to repeat the segment (1 or more). 
#               In Autopause ON: pauses after N repeats.
#               In Autopause OFF: continues after N repeats.
script-opts-append=kardenwort-replay_ms=2000
script-opts-append=kardenwort-replay_count=1
# replay_autostop: If yes, pauses at the end of iterations in Autopause ON mode.
script-opts-append=kardenwort-replay_autostop=no
# replay_msg_format: Template for replay OSD in Autopause OFF mode.
# Placeholders: %m=ms, %c=count, %x=conditional count display (e.g. x2).
