# Primary subtitle alignment (Default is bottom).
# By staying at the bottom, secondary subtitles will automatically appear at the top.
sub-align-y=bottom
sub-margin-y=20

# [LINKED] Secondary subtitle position (percentage from top).
# This is the 'default' start position.
# [v1.2.12] Can be adjusted on-the-fly with 'Shift+R'/'Shift+T' (EN) or 'К'/'Е' (RU).
secondary-sub-pos=10

# [LINKED] Main subtitle position (percentage from top). 
# 95-100 is the bottom area; adjusting this helps avoid overlap with OSC.
# [v1.2.12] Can be adjusted on-the-fly with 'r'/'t' (EN) or 'к'/'е' (RU).
sub-pos=95

# =========================================================================
# LLS SCRIPT OVERRIDES
# You can control lls_core.lua behavior here without editing the script.
# =========================================================================

# [NOTE] Toggle Destinations for cmd_cycle_sec_pos:
# sec_pos_bottom MUST be different (e.g., 90) from sub-pos (95) 
# to preserve a 5% "Safety Gap" so dual subtitles don't stick together.
script-opts-append=lls-sec_pos_top=10
script-opts-append=lls-sec_pos_bottom=90

# Reasonable default font size for .srt subtitles (mpv default 55 is often too large)
sub-font-size=24
# Automatically load all subtitles in the folder (useful for EN + RU .srt files)
# sub-auto=all
# Automatically load subtitle files containing the video's filename (better than 'all' to avoid cross-episode loading)
sub-auto=fuzzy

# Preferred audio and subtitle languages (prioritizes English for language acquisition)
# alang=english,eng,en
# slang=english,eng,en

# Hide subtitles by default for listening practice (relies on hotkeys/scripts to show them)
# sub-visibility=no

# Support for HTML tags and styles
sub-ass=yes
# STRICTLY respect the .ass file's internal styles (From Android Config)
sub-ass-override=no

# save-position-on-quit=no
save-position-on-quit=yes

# Always open the window exactly in the center of the screen
geometry=50%:50%

# Limit the maximum window size to 100% of the screen size,
# so that the video never goes beyond the borders of the monitor
autofit-larger=100%x100%
 
# (Optional) If you want the player to ALWAYS open in a specific size, 
# ignoring video resolution (e.g. 1280x720):
# autofit=1280x720
autofit=1920x1080

# --- Let MPV scale subtitles with the window! ---
# If these are 'no', .srt text becomes giant on smaller windows.
# sub-scale-with-window=no
# sub-ass-scale-with-window=no

# Increase or decrease the base font size from the subtitle file
# 1.0 - original size, 1.5 - 50% larger, 0.8 - 20% smaller
# sub-scale=1.5

# Disable OSC (panel) at startup
# osc=no
# osd-bar=no

# # Prevent OSC from appearing on mouse hover
script-opts-append=osc-visibility=never

# =========================================================================
# SUBTITLE & OSD BACKGROUND SETTINGS 
# =========================================================================
# To disable the background frame and return to the default mpv style
# (text with an outline and no box), simply comment out the lines below
# by adding a `#` at the beginning of each line, or change the `*-border-style`
# options to `outline-and-shadow`.

# Subtitle background (black text frame) for Normal Mode
sub-border-style=background-box
sub-back-color="#C0000000"  # Format AARRGGBB - C0 is ~75% opaque black
sub-border-size=1.5
sub-shadow-offset=0

# OSD background for Drum Mode and general UI messages
osd-border-style=background-box
osd-back-color="#C0000000"  # Format AARRGGBB - C0 is ~75% opaque black
osd-border-size=1.5
osd-shadow-offset=0